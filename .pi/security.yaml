# Pi Security Configuration
# See docs/security.md for the full security guide

# Security guard (pre-tool-hook)
guard:
  enabled: true

  # Blocked command patterns
  blocked_patterns:
    - "rm -rf"
    - "rm -r"
    - "sudo"
    - "curl.*\\|.*sh"
    - "wget.*\\|.*sh"
    - "env dump"
    - "env vars"

  # Protected paths (block reads)
  protected_paths:
    - "~/.ssh/"
    - "~/.aws/"
    - "~/.gcloud/"
    - ".env"
    - ".env.*"
    - "*.secret"
    - "credentials.json"

# Allowlist (override blocked patterns for specific safe uses)
allowlist:
  - pattern: "rm -rf ./node_modules"
    reason: "Clean install, known safe path"
  - pattern: "rm -rf ./.next"
    reason: "Next.js build cache"
  - pattern: "rm -rf ./dist"
    reason: "Build output cleanup"

# Network restrictions
network:
  allow_external_urls: false  # Require confirmation for external URLs
  safe_port_scan_only: true   # Only loopback + private IPs

# Audit
audit:
  log_tool_calls: true
  log_file: .pi/security-audit.log
